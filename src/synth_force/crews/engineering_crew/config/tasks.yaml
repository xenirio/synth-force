create_ticket:
  description: >
    For the task issue #{task_issue_number} in repository '{repo_full_name}',
    read the task details and create a detailed implementation ticket as a
    new GitHub issue.

    BEFORE creating a new issue, you MUST check for duplicates:
    1. Use github_list_issues to list open issues with the 'ticket' label
    2. Check if any existing ticket already covers the same task (references
       #{task_issue_number} or has a matching title/scope)
    3. If a matching ticket already exists, DO NOT create a new one — return
       the existing ticket's details instead

    If no duplicate exists, create a new ticket that includes:
    - A clear title prefixed with "[Ticket]"
    - Technical specifications for implementation
    - File paths that need to be created or modified
    - Acceptance criteria
    - Reference the parent task: "Parent task: #{task_issue_number}"
    - Add the label 'ticket'

    Return the ticket's issue_number, issue_url, and title as JSON:
    {{"issue_number": N, "issue_url": "https://...", "title": "..."}}
  expected_output: >
    JSON object with the ticket's issue_number, issue_url, and title.
  agent: senior_software_engineer

implement_code:
  description: >
    You will receive the output from the previous task containing a ticket's
    issue_number, issue_url, and title. Extract the ticket issue number from that output.

    Then in repository '{repo_full_name}':
    1. Read the ticket issue to understand what to implement
    2. Try to create the branch 'feature/ticket-<TICKET_NUMBER>' from main. If
       it already exists, that is fine.
    3. Try to open a pull request from the feature branch to main using github_create_pr.
       If a PR already exists, it will return the existing PR details.
    4. IF THE PR ALREADY EXISTS: Do NOT rewrite the files. Just extract the
       PR number and return the JSON immediately. The review and CI fix steps
       will handle any remaining issues.
    5. IF THE PR DOES NOT EXIST (you just created a new one):
       a. Read package.json (or requirements.txt / pyproject.toml) to understand
          what dependencies and frameworks are installed. ONLY use libraries and
          frameworks that are already in the project dependencies. Do NOT use
          Tailwind, Bootstrap, or any other framework that is not installed.
       b. Write the required code files to the branch using git_write_file
       c. Reference the ticket in the PR body with "Closes #<TICKET_NUMBER>"

    CRITICAL RULES:
    - If creating a new project, you MUST create package.json (or equivalent)
      with all required dependencies FIRST before creating any other files.
    - For Next.js apps: package.json must include next, react, react-dom as
      dependencies. Also create next.config.js.
    - For Next.js apps: ensure `.eslintrc.json` exists in the repo root so that
      `next lint` does not prompt interactively in CI. If it does not exist,
      create it on your branch with: {{"extends": "next/core-web-vitals"}}
    - CSS Modules (`.module.css`) cannot use bare `:global()` selectors — they
      require at least one local class. For global theme styles, use a plain
      `.css` file (not `.module.css`) or wrap with a local class.
    - ALL files must go inside the `app/` directory for Next.js App Router.
      Do NOT create files in root-level `components/`, `styles/`, or `pages/`
      directories. Components go in `app/components/`, styles in `app/` alongside
      their components.

    Return the PR number, URL, and ticket issue number as JSON:
    {{"pr_number": N, "pr_url": "https://...", "ticket_issue_number": N}}
  expected_output: >
    JSON object with pr_number, pr_url, and ticket_issue_number.
  agent: software_engineer

review_code:
  description: >
    You will receive the output from the previous task containing pr_number,
    ci_status, and other details. Extract the PR number and ci_status.

    CI has already been checked and fixed in the previous step. Now review the
    code quality of that pull request in repository '{repo_full_name}'.

    Read the PR details and changed files. Evaluate:
    - Does the code fulfill the ticket requirements?
    - Is the code clean and well-structured?
    - Are there any bugs or issues?

    If ci_status is "all_passed" or "pending" and the code looks reasonable,
    APPROVE the PR. Only REQUEST_CHANGES if there are clear functional bugs
    or missing requirements — do not block on style nits.

    Submit your review using the github_review_pr tool with event 'APPROVE' or 'REQUEST_CHANGES'.
    If the review tool reports self-review is not allowed, that is OK — treat it as approved.

    IMPORTANT: Do NOT merge the PR. Merging happens in a later step.

    Return the result as JSON including all fields:
    {{"review_status": "approved", "ci_status": "all_passed", "pr_number": N, "pr_url": "...", "issue_number": N, "issue_url": "...", "title": "..."}}
  expected_output: >
    JSON object with review_status, ci_status, pr_number, pr_url, issue_number, issue_url, and title.
  agent: senior_software_engineer

fix_ci_failures:
  description: >
    You will receive the output from the previous task containing pr_number
    and other details. Extract the pr_number from that output.

    First, use check_pr_ci_status to check whether CI is passing for that PR
    in repository '{repo_full_name}' (use wait_seconds=180 to allow CI to run).

    If ci_status is "all_passed" or "pending", do nothing — return the JSON
    with the ci_status included.

    If ci_status is "failed":
    1. Read the error lines from the check_pr_ci_status output
    2. Diagnose the failure from the error output. Common issues:
       - Lint fails with interactive prompt: `next lint` needs `.eslintrc.json`.
         Fix by creating `.eslintrc.json` with {{"extends": "next/core-web-vitals"}}
       - CSS Modules purity error with `:global()` selectors: CSS Modules
         require at least one local class. Use a wrapper class like
         `.themeRoot:global(.theme-light) {{}}` or move global styles to a
         plain `.css` file (not `.module.css`).
       - "Module not found / Can't resolve": Check the import path is correct.
         In Next.js, `@/` maps to the project root, so `app/context/ThemeContext.js`
         is imported as `@/app/context/ThemeContext`. Make sure the file actually
         exists on the branch.
       - Missing config files (tsconfig.json, next.config.js, etc.)
    3. Read the failing files using github_read_file_content on the PR branch
    4. Fix the code using git_write_file on the same branch
    5. Wait for CI to re-run by calling check_pr_ci_status again (wait_seconds=120)
    6. Repeat up to 3 attempts if CI keeps failing

    Return the updated JSON with the latest ci_status:
    {{"review_status": "...", "ci_status": "all_passed|failed", "pr_number": N, "pr_url": "...", "issue_number": N, "issue_url": "...", "title": "...", "ci_fix_attempts": N}}
  expected_output: >
    JSON object with review_status, ci_status, pr_number, pr_url, issue_number, issue_url, title, and ci_fix_attempts.
  agent: software_engineer

merge_pr:
  description: >
    You will receive the output from the previous task containing ci_status,
    review_status, and pr_number.

    Merge the PR ONLY if BOTH conditions are true:
    - ci_status is "all_passed" OR "pending" (pending means no CI is configured, which is OK)
    - review_status is "approved"

    If both conditions are met, extract the pr_number from the previous output
    and merge that PR in repository '{repo_full_name}' using the github_merge_pr tool.

    If either condition is not met, do NOT merge. Report the reason.

    Return the final result as JSON:
    {{"review_status": "...", "ci_status": "...", "merged": true/false, "pr_number": N, "pr_url": "...", "issue_number": N, "issue_url": "...", "title": "..."}}
  expected_output: >
    JSON object with review_status, ci_status, merged, pr_number, pr_url, issue_number, issue_url, and title.
  agent: senior_software_engineer
