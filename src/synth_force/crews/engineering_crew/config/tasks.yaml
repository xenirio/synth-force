create_ticket:
  description: >
    For the task issue #{task_issue_number} in repository '{repo_full_name}',
    read the task details and assess the complexity.

    STEP 1 — ASSESS COMPLEXITY:
    Read the task issue and determine if it is simple or complex:
    - SIMPLE: Single-file changes, straightforward bug fixes, small UI tweaks,
      copy changes, adding/removing a single component, or any task that a
      developer could implement without further breakdown.
    - COMPLEX: Multi-component features, tasks requiring changes across many
      files, architectural changes, or tasks that benefit from detailed
      technical specifications.

    STEP 2A — IF SIMPLE:
    Do NOT create a new ticket issue. Use the task issue itself as the
    implementation target. Add the label 'ticket' to the task issue using
    github_update_issue, then return the task issue details:
    {{"issue_number": {task_issue_number}, "issue_url": "https://github.com/{repo_full_name}/issues/{task_issue_number}", "title": "<task title>"}}

    STEP 2B — IF COMPLEX:
    BEFORE creating a new issue, check for duplicates:
    1. Use github_list_issues to list open issues with the 'ticket' label
    2. Check if any existing ticket already covers the same task (references
       #{task_issue_number} or has a matching title/scope)
    3. If a matching ticket already exists, DO NOT create a new one — return
       the existing ticket's details instead

    If no duplicate exists, create a new ticket that includes:
    - A clear title prefixed with "[Ticket]"
    - Technical specifications for implementation
    - File paths that need to be created or modified
    - Acceptance criteria
    - Reference the parent task: "Parent task: #{task_issue_number}"
    - Add the label 'ticket'

    Return the ticket's issue_number, issue_url, and title as JSON:
    {{"issue_number": N, "issue_url": "https://...", "title": "..."}}
  expected_output: >
    JSON object with the ticket's issue_number, issue_url, and title.
  agent: senior_software_engineer

implement_code:
  description: >
    You will receive the output from the previous task containing a ticket's
    issue_number, issue_url, and title. Extract the ticket issue number from that output.

    Then in repository '{repo_full_name}':
    1. Read the ticket issue to understand what to implement
    2. Try to create the branch 'feature/ticket-<TICKET_NUMBER>' from main. If
       it already exists, that is fine.
    3. Try to open a pull request from the feature branch to main using github_create_pr.
       If a PR already exists, it will return the existing PR details.
    4. IF THE PR ALREADY EXISTS: Do NOT rewrite the files. Just extract the
       PR number and return the JSON immediately. The review and CI fix steps
       will handle any remaining issues.
    5. IF THE PR DOES NOT EXIST (you just created a new one):
       a. FIRST: Read package.json (or requirements.txt / pyproject.toml) using
          github_read_file_content. Make a mental list of EVERY dependency.
          You may ONLY use packages that appear in this file. If a package is
          not listed, you MUST NOT import it in your code. No exceptions.
       b. SECOND: Read the existing files you plan to modify (layout.tsx,
          page.tsx, etc.) to understand current imports and structure.
       c. THIRD: Write the required code files to the branch using git_write_file.
          Every import in your code must be either: (1) a package listed in
          package.json, (2) a relative import to a file that exists or that you
          are creating, or (3) a Node.js built-in.
       d. Reference the ticket in the PR body with "Closes #<TICKET_NUMBER>"

    DEPENDENCY RULES (MOST IMPORTANT — violating these breaks the build):
    - You MUST read package.json BEFORE writing any code.
    - You may ONLY import packages that are listed in package.json dependencies
      or devDependencies. If a package is not there, DO NOT use it.
    - DO NOT use: Tailwind CSS utility classes (unless tailwindcss is in
      package.json), Bootstrap, lucide-react, next-themes, shadcn/ui, or ANY
      other library unless it is in package.json.
    - If you need a package that is not installed, either:
      (a) Add it to package.json first by rewriting package.json with the new
          dependency added, OR
      (b) Implement the functionality without that package using plain
          HTML/CSS/JS.
    - NEVER assume a package is installed. ALWAYS verify by reading package.json.

    FILE RULES:
    - When you modify a file, you MUST include ALL existing imports and content
      that you are not intentionally removing. Do NOT write partial files that
      drop existing imports like './globals.css' or existing components.
    - If your code imports a file (CSS, component, context, etc.), verify that
      file exists on the branch. If it does not exist, either create it or
      remove the import.
    - CASE SENSITIVITY: Before creating new component directories, read the
      existing directory structure. If a component already exists (e.g.
      app/components/Footer/), do NOT create a new directory with different
      casing (e.g. app/components/footer/). Reuse the existing path exactly.
    - When the task is to FIX or MODIFY existing components, prefer editing the
      existing files in their current paths rather than creating new files.
    - For Next.js App Router: ALL files must go inside the `app/` directory.
      Do NOT create files in root-level `components/`, `styles/`, or `pages/`.
    - For Next.js: ensure `.eslintrc.json` exists so `next lint` does not
      prompt interactively in CI.

    Return the PR number, URL, and ticket issue number as JSON:
    {{"pr_number": N, "pr_url": "https://...", "ticket_issue_number": N}}
  expected_output: >
    JSON object with pr_number, pr_url, and ticket_issue_number.
  agent: software_engineer

review_code:
  description: >
    You will receive the output from the previous task containing pr_number,
    ci_status, and other details. Extract the PR number and ci_status.

    CI has already been checked and fixed in the previous step. Now review the
    code quality of that pull request in repository '{repo_full_name}'.

    Read the PR details and changed files. Evaluate:
    - Does the code fulfill the ticket requirements?
    - Is the code clean and well-structured?
    - Are there any bugs or issues?

    If ci_status is "all_passed" or "pending" and the code looks reasonable,
    APPROVE the PR. Only REQUEST_CHANGES if there are clear functional bugs
    or missing requirements — do not block on style nits.

    Submit your review using the github_review_pr tool with event 'APPROVE' or 'REQUEST_CHANGES'.
    If the review tool reports self-review is not allowed, that is OK — treat it as approved.

    IMPORTANT: Do NOT merge the PR. Merging happens in a later step.

    Return the result as JSON including all fields:
    {{"review_status": "approved", "ci_status": "all_passed", "pr_number": N, "pr_url": "...", "issue_number": N, "issue_url": "...", "title": "..."}}
  expected_output: >
    JSON object with review_status, ci_status, pr_number, pr_url, issue_number, issue_url, and title.
  agent: senior_software_engineer

fix_ci_failures:
  description: >
    You will receive the output from the previous task containing pr_number
    and other details. Extract the pr_number from that output.

    First, use check_pr_ci_status to check whether CI is passing for that PR
    in repository '{repo_full_name}' (use wait_seconds=180 to allow CI to run).

    If ci_status is "all_passed" or "pending", do nothing — return the JSON
    with the ci_status included.

    If ci_status is "failed":
    1. Read the error lines from the check_pr_ci_status output
    2. Diagnose the failure from the error output. Common issues:
       - "Cannot find module" or "Can't resolve" for CSS/component imports:
         A file was imported but does not exist on the branch. Read the
         importing file to see what it expects, then EITHER create the missing
         file using git_write_file OR fix the import. For example, if
         layout.tsx imports './globals.css' but that file was not created on
         the branch, you must create app/globals.css with appropriate content.
         Always check what files exist on the PR branch before deciding.
       - "Type error: Cannot find module or type declarations for side-effect
         import": Same as above — the imported file is missing on the branch.
       - Lint fails with interactive prompt: `next lint` needs `.eslintrc.json`.
         Fix by creating `.eslintrc.json` with {{"extends": "next/core-web-vitals"}}
       - CSS Modules purity error with `:global()` selectors: CSS Modules
         require at least one local class. Use a wrapper class like
         `.themeRoot:global(.theme-light) {{}}` or move global styles to a
         plain `.css` file (not `.module.css`).
       - "Module not found / Can't resolve" for packages: FIRST read
         package.json to check if the package is actually installed. If the
         package is NOT in package.json, you have two options:
         (a) Add the package to package.json by rewriting it with the new
             dependency, OR
         (b) Remove the import and rewrite the code to not use that package.
         If the package IS in package.json, check the import path is correct.
         In Next.js, `@/` maps to the project root, so
         `app/context/ThemeContext.js` is imported as
         `@/app/context/ThemeContext`.
       - Missing config files (tsconfig.json, next.config.js, etc.)
       - "File name differs only in casing" error: This means two file paths
         exist that differ only in case (e.g. components/Footer/ vs
         components/footer/). You cannot delete files via the GitHub API.
         Instead, fix ALL imports in the codebase to use the SAME casing as
         the original file path on main. Read layout.tsx and other importing
         files to update their import paths to match the existing directory
         casing exactly. If you created new files in a wrongly-cased directory,
         rewrite them into the correctly-cased directory path instead.
    3. Read the failing file AND the file it imports using
       github_read_file_content on the PR branch to understand what is missing
    4. Fix the code using git_write_file on the same branch — either create
       the missing file or fix the import
    5. Wait for CI to re-run by calling check_pr_ci_status again (wait_seconds=120)
    6. Repeat up to 3 attempts if CI keeps failing

    Return the updated JSON with the latest ci_status:
    {{"review_status": "...", "ci_status": "all_passed|failed", "pr_number": N, "pr_url": "...", "issue_number": N, "issue_url": "...", "title": "...", "ci_fix_attempts": N}}
  expected_output: >
    JSON object with review_status, ci_status, pr_number, pr_url, issue_number, issue_url, title, and ci_fix_attempts.
  agent: software_engineer

merge_pr:
  description: >
    You will receive the output from the previous task containing ci_status,
    review_status, and pr_number.

    Merge the PR ONLY if BOTH conditions are true:
    - ci_status is "all_passed" OR "pending" (pending means no CI is configured, which is OK)
    - review_status is "approved"

    If both conditions are met, extract the pr_number from the previous output
    and merge that PR in repository '{repo_full_name}' using the github_merge_pr tool.

    If either condition is not met, do NOT merge. Report the reason.

    Return the final result as JSON:
    {{"review_status": "...", "ci_status": "...", "merged": true/false, "pr_number": N, "pr_url": "...", "issue_number": N, "issue_url": "...", "title": "..."}}
  expected_output: >
    JSON object with review_status, ci_status, merged, pr_number, pr_url, issue_number, issue_url, and title.
  agent: senior_software_engineer
